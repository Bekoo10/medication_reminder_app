name: medication_reminder
description: A comprehensive Medication Reminder application built with Flutter, go_router, and sqflite.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  go_router: ^13.0.0
  sqflite: ^2.3.0
  path: ^1.9.0
  audioplayers: ^6.0.0
  intl: ^0.19.0
  cupertino_icons: ^1.0.6
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
